<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="spamBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34495E"/>
      <stop offset="100%" style="stop-color:#1c2833"/>
    </linearGradient>
    <linearGradient id="redAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="300" fill="url(#spamBg)"/>
  <rect x="0" y="0" width="900" height="3" fill="url(#redAccent)"/>
  <rect x="0" y="297" width="900" height="3" fill="url(#redAccent)"/>
  <!-- Flooding envelopes -->
  <g opacity="0.2">
    <rect x="60" y="80" width="50" height="35" rx="3" fill="none" stroke="#E74C3C" stroke-width="1.5" transform="rotate(-15, 85, 97)"/>
    <rect x="40" y="120" width="50" height="35" rx="3" fill="none" stroke="#E74C3C" stroke-width="1.5" transform="rotate(5, 65, 137)"/>
    <rect x="80" y="155" width="50" height="35" rx="3" fill="none" stroke="#E74C3C" stroke-width="1.5" transform="rotate(-8, 105, 172)"/>
    <rect x="55" y="190" width="50" height="35" rx="3" fill="none" stroke="#E74C3C" stroke-width="1.5" transform="rotate(12, 80, 207)"/>
  </g>
  <!-- Main envelope -->
  <rect x="120" y="100" width="90" height="65" rx="5" fill="#E74C3C" opacity="0.9"/>
  <polyline points="120,100 165,140 210,100" fill="none" stroke="#fff" stroke-width="2" opacity="0.8"/>
  <line x1="120" y1="165" x2="150" y2="135" stroke="#fff" stroke-width="1" opacity="0.4"/>
  <line x1="210" y1="165" x2="180" y2="135" stroke="#fff" stroke-width="1" opacity="0.4"/>
  <!-- Multiple send arrows -->
  <path d="M220 115 L250 115" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowRed)"/>
  <path d="M220 130 L260 130" stroke="#E74C3C" stroke-width="2" opacity="0.7"/>
  <path d="M220 145 L245 145" stroke="#E74C3C" stroke-width="2" opacity="0.5"/>
  <!-- Inbox graphic right side -->
  <rect x="750" y="80" width="100" height="130" rx="6" fill="#2c3e50" stroke="#E74C3C" stroke-width="2"/>
  <rect x="760" y="95" width="80" height="18" rx="3" fill="#E74C3C" opacity="0.6"/>
  <rect x="760" y="118" width="80" height="18" rx="3" fill="#E74C3C" opacity="0.5"/>
  <rect x="760" y="141" width="80" height="18" rx="3" fill="#E74C3C" opacity="0.4"/>
  <rect x="760" y="164" width="80" height="18" rx="3" fill="#E74C3C" opacity="0.3"/>
  <text x="800" y="230" font-family="Arial, sans-serif" font-size="11" fill="#E74C3C" text-anchor="middle" opacity="0.7">999+ unread</text>
  <!-- Brand text -->
  <text x="320" y="125" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="white" filter="url(#redGlow)">Email Spammer</text>
  <text x="320" y="160" font-family="Arial, sans-serif" font-size="16" fill="#bdc3c7">Mass Email Sender &amp; Flooder Tool</text>
  <!-- Feature pills -->
  <rect x="320" y="180" width="80" height="26" rx="13" fill="#E74C3C" opacity="0.9"/>
  <text x="360" y="197" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">SMTP</text>
  <rect x="410" y="180" width="80" height="26" rx="13" fill="#E74C3C" opacity="0.8"/>
  <text x="450" y="197" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Proxy</text>
  <rect x="500" y="180" width="90" height="26" rx="13" fill="#E74C3C" opacity="0.7"/>
  <text x="545" y="197" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Templates</text>
  <rect x="600" y="180" width="80" height="26" rx="13" fill="#E74C3C" opacity="0.6"/>
  <text x="640" y="197" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Rotate</text>
  <!-- Version -->
  <rect x="320" y="225" width="80" height="24" rx="12" fill="none" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="360" y="241" font-family="Arial, sans-serif" font-size="11" fill="#E74C3C" text-anchor="middle">v1.8.3</text>
</svg>